set -g mouse on
set -g default-terminal "tmux-256color"
set -g renumber-windows on
set -sg escape-time 0
set -g focus-events on
set -s extended-keys off

# Agent CLIs render on the main screen (no alt-screen), so their output lands
# in tmux history; the 2000-line default loses long sessions.
set -g history-limit 100000

# OSC 52 clipboard from vim / Claude Code /terminal-setup
set -g allow-passthrough on

# Agent completion bells (Codex [tui] notifications, Claude Code Stop hook)
# flag the window even when unfocused; pinned in case of overrides.
set -g bell-action any
setw -g monitor-bell on

