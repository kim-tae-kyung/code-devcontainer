model_reasoning_effort = "medium"
approval_policy = "never"
sandbox_mode = "danger-full-access"

[features]
fast_mode = false
memories = false

[mcp_servers.context7]
command = "npx"
args = ["-y", "@upstash/context7-mcp"]

[mcp_servers.playwright]
command = "npx"
args = [
  "-y",
  "@playwright/mcp@latest",
  "--headless",
  "--browser=chromium",
  "--no-sandbox",
]
